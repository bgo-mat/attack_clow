[program:ollama]
environment=PROC_NAME="%(program_name)s",OLLAMA_HOST="0.0.0.0:11434"
command=/opt/supervisor-scripts/ollama.sh
autostart=true
autorestart=true
startsecs=5
startretries=3
stopasgroup=true
killasgroup=true
stopsignal=TERM
stopwaitsecs=15
priority=100
stdout_logfile=/dev/stdout
redirect_stderr=true
stdout_events_enabled=true
stdout_logfile_maxbytes=0
stdout_logfile_backups=0
